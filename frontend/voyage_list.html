<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>出海航次管理</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; padding: 20px; background-color: #f0f2f5; margin: 0; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background-color: white; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e8e8e8; }
        th { background-color: #fafafa; color: #333; }
        .status-going { color: #faad14; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h2>🌊 出海航次记录</h2>
    </div>

    <table>
        <thead>
            <tr>
                <th>记录ID</th>
                <th>出海船员</th>
                <th>出发地</th>
                <th>目的地</th>
                <th>出发时间</th>
                <th>预计到达时间</th>
                <th>当前状态</th>
            </tr>
        </thead>
        <tbody id="voyageTableBody">
            <tr><td colspan="7" style="text-align: center;">加载中...</td></tr>
        </tbody>
    </table>

    <script>
        window.onload = async function() {
            try {
                const response = await fetch('http://localhost:3000/api/voyages');
                const result = await response.json();
                if (result.success) {
                    renderTable(result.data);
                }
            } catch (error) {
                console.error('网络错误:', error);
            }
        };

        // 👇 这是一个专门用来把丑陋的数据库时间变成漂亮时间的“小工具函数”
        function formatDate(dateString) {
            if (!dateString) return '暂无';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', { 
                year: 'numeric', month: '2-digit', day: '2-digit', 
                hour: '2-digit', minute: '2-digit' 
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('voyageTableBody');
            tbody.innerHTML = ''; 

            data.forEach(voyage => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${voyage.record_id}</td>
                    <td style="color:#1890ff; font-weight:bold;">${voyage.crew_name}</td>
                    <td>${voyage.departure_point}</td>
                    <td>${voyage.destination_point}</td>
                    <td>${formatDate(voyage.departure_time)}</td>
                    <td>${formatDate(voyage.expected_arrival_time)}</td>
                    <td class="status-going">${voyage.status}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
